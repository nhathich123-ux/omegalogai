<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glowing background glow -->
  <circle cx="50" cy="50" r="35" fill="#ff7a45" fill-opacity="0.05" filter="blur(8px)" />
  <!-- Outer hexagonal border -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" stroke="#ff7a45" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="4 8" />
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" stroke="#ff7a45" stroke-width="1" stroke-opacity="0.5" />
  
  <!-- Cybernetic Omega symbol (Ω) -->
  <path d="M 28,72 L 40,72 C 34,65 30,55 30,45 C 30,32 40,22 53,22 C 66,22 76,32 76,45 C 76,55 72,65 66,72 L 78,72" 
        stroke="#ff7a45" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- Core energy node -->
  <circle cx="53" cy="45" r="8" fill="#ff7a45" fill-opacity="0.2" />
  <circle cx="53" cy="45" r="4" fill="#ff7a45" />
  <circle cx="53" cy="45" r="1.5" fill="#ffffff" />
  
  <!-- Circuit lines radiating from center -->
  <path d="M 53,22 L 53,10" stroke="#ff7a45" stroke-width="1.5" stroke-opacity="0.7" />
  <circle cx="53" cy="10" r="2" fill="#ff7a45" />
  
  <path d="M 30,45 L 18,45" stroke="#ff7a45" stroke-width="1.5" stroke-opacity="0.7" />
  <circle cx="18" cy="45" r="2" fill="#ff7a45" />
  
  <path d="M 76,45 L 88,45" stroke="#ff7a45" stroke-width="1.5" stroke-opacity="0.7" />
  <circle cx="88" cy="45" r="2" fill="#ff7a45" />
  
  <!-- Technical label -->
  <text x="50" y="88" text-anchor="middle" fill="#ff7a45" font-family="monospace" font-size="8" font-weight="bold" letter-spacing="1">Ω_CORE</text>
</svg>
